<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Republic Excursions - Generador de Recibos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            max-width: 850px;
            width: 100%;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 5px;
            font-size: 28px;
        }
        .subtitulo {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 15px;
            transition: border 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #667eea;
            outline: none;
        }
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-row .form-group {
            flex: 1;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            background: #5563c1;
            transform: translateY(-2px);
        }
        .resultado {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
            border: 2px solid #28a745;
        }
        .resultado.visible {
            display: block;
        }
        .resultado h3 {
            color: #28a745;
            margin-bottom: 15px;
            text-align: center;
        }
        .resultado .enlace {
            word-break: break-all;
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            font-size: 13px;
            margin-bottom: 15px;
        }
        .resultado .qr-container {
            text-align: center;
            margin: 15px 0;
        }
        .resultado .qr-container img {
            max-width: 180px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 10px;
            background: white;
        }
        .btn-copiar {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-copiar:hover {
            background: #218838;
        }
        .btn-qr {
            background: #ffc107;
            color: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-qr:hover {
            background: #e0a800;
        }
        .btn-whatsapp {
            background: #25D366;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn-whatsapp:hover {
            background: #1da851;
        }
        .estado-options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            padding-top: 5px;
        }
        .estado-options label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: normal;
            cursor: pointer;
            font-size: 14px;
        }
        .estado-options input[type="radio"] {
            width: auto;
            margin: 0;
        }
        .acciones {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }
        .btn-ver-recibo {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
        }
        .btn-ver-recibo:hover {
            background: #5563c1;
        }
        .small-hint {
            color: #888;
            font-size: 12px;
            margin-top: 4px;
        }
        .descuento-activo {
            display: none;
        }
        .descuento-activo.visible {
            display: block;
        }
        .btn-descuento {
            background: #6c757d;
            padding: 12px 20px;
            font-size: 14px;
            width: auto;
            margin-top: 0;
        }
        .btn-descuento:hover {
            background: #5a6268;
        }
        .btn-descuento.activo {
            background: #dc3545;
        }
        .btn-descuento.activo:hover {
            background: #c82333;
        }
        @media (max-width: 600px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>REPUBLIC EXCURSIONS</h1>
        <p class="subtitulo">Generador de Recibos de Pago</p>

        <form id="formRecibo">
            <!-- DATOS DE LA RESERVA -->
            <div class="form-row">
                <div class="form-group">
                    <label>ID / Código de Reserva</label>
                    <input type="text" id="id">
                </div>
                <div class="form-group">
                    <label>Número de Recibo</label>
                    <input type="text" id="recibo">
                </div>
            </div>

            <!-- DATOS DEL CLIENTE -->
            <div class="form-group">
                <label>Cliente</label>
                <input type="text" id="cliente">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>WhatsApp</label>
                    <input type="text" id="whatsapp">
                </div>
                <div class="form-group">
                    <label>Correo</label>
                    <input type="email" id="correo">
                </div>
            </div>

            <!-- HOTEL Y HABITACION -->
            <div class="form-row">
                <div class="form-group">
                    <label>Hotel</label>
                    <input type="text" id="hotel">
                </div>
                <div class="form-group">
                    <label>Número de Habitación</label>
                    <input type="text" id="habitacion">
                </div>
            </div>

            <!-- TRANSPORTE Y FECHA -->
            <div class="form-row">
                <div class="form-group">
                    <label>Transporte</label>
                    <select id="transporte">
                        <option value="Sí">Sí</option>
                        <option value="No">No</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Fecha de la Excursión</label>
                    <input type="date" id="fechaExcursion">
                </div>
            </div>

            <!-- EXCURSIÓN -->
            <div class="form-group">
                <label>Excursión</label>
                <input type="text" id="excursion">
            </div>

            <!-- PERSONAS -->
            <div class="form-row">
                <div class="form-group">
                    <label>Adultos</label>
                    <input type="number" id="adultos" value="" min="0">
                </div>
                <div class="form-group">
                    <label>Niños</label>
                    <input type="number" id="ninos" value="" min="0">
                </div>
            </div>

            <!-- PRECIOS -->
            <div class="form-row">
                <div class="form-group">
                    <label>Precio por Adulto (USD)</label>
                    <input type="number" id="precioAdulto" value="" min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label>Precio por Niño (USD)</label>
                    <input type="number" id="precioNino" value="" min="0" step="0.01">
                    <div class="small-hint">Si no aplica, dejar en 0.</div>
                </div>
            </div>

            <!-- FINANCIERO Y DESCUENTO -->
            <div class="form-row">
                <div class="form-group">
                    <label>Subtotal (USD)</label>
                    <input type="number" id="subtotal" value="" min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label>Depósito Pagado (USD)</label>
                    <input type="number" id="deposito" value="" min="0" step="0.01">
                </div>
            </div>

            <!-- DESCUENTO (OCULTO POR DEFECTO) -->
            <div class="form-group descuento-activo" id="descuentoGroup">
                <label>Descuento (USD)</label>
                <input type="number" id="descuento" value="" min="0" step="0.01" oninput="calcularTotal()">
                <div class="small-hint">Monto a descontar del subtotal</div>
            </div>

            <!-- TOTAL Y BOTON DESCUENTO -->
            <div class="form-row">
                <div class="form-group">
                    <label>Total (USD)</label>
                    <input type="number" id="total" value="" min="0" step="0.01" readonly style="background: #f0f0f0; font-weight: bold; color: #1a3c6e;">
                </div>
                <div class="form-group" style="display: flex; align-items: flex-end;">
                    <button type="button" class="btn btn-descuento" id="btnDescuento" onclick="toggleDescuento()">Agregar Descuento</button>
                </div>
            </div>

            <!-- ESTADO DE PAGO -->
            <div class="form-group">
                <label>Estado de Pago</label>
                <div class="estado-options">
                    <label><input type="radio" name="estado" value="deposito" checked onclick="ajustarDeposito()"> Depósito (25%)</label>
                    <label><input type="radio" name="estado" value="completo" onclick="ajustarDeposito()"> Pago Completo</label>
                    <label><input type="radio" name="estado" value="pendiente" onclick="ajustarDeposito()"> Pendiente</label>
                </div>
                <div class="small-hint" style="margin-top: 5px;">
                    Al seleccionar "Pago Completo", el depósito se ajusta al total y no se muestra en el recibo.
                </div>
            </div>

            <!-- METODO DE PAGO Y NOTAS -->
            <div class="form-row">
                <div class="form-group">
                    <label>Método de Pago</label>
                    <select id="metodoPago">
                        <option value="Efectivo">Efectivo</option>
                        <option value="PayPal">PayPal</option>
                        <option value="Tarjeta de Crédito">Tarjeta de Crédito</option>
                        <option value="Transferencia Bancaria">Transferencia Bancaria</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Notas Adicionales</label>
                    <input type="text" id="notas">
                </div>
            </div>

            <button type="submit" class="btn">GENERAR RECIBO</button>
        </form>

        <!-- RESULTADO -->
        <div id="resultado" class="resultado">
            <h3>Recibo Generado Exitosamente</h3>
            
            <div class="qr-container">
                <img id="qrImg" src="" alt="QR Code">
            </div>

            <div class="enlace" id="enlaceGenerado"></div>

            <div class="acciones">
                <button class="btn-copiar" onclick="copiarEnlace()">Copiar Enlace</button>
                <button class="btn-qr" onclick="descargarQR()">Descargar QR</button>
                <a id="whatsappLink" href="#" target="_blank" class="btn-whatsapp">Enviar por WhatsApp</a>
            </div>

            <div style="text-align: center; margin-top: 15px;">
                <a id="verRecibo" href="#" target="_blank" class="btn-ver-recibo">Ver Recibo</a>
            </div>
        </div>
    </div>

    <script>
        // ====== GENERAR CÓDIGOS AUTOMÁTICAMENTE ======
        document.addEventListener('DOMContentLoaded', function() {
            const hoy = new Date();
            const fechaStr = hoy.getFullYear() + '-' + String(hoy.getMonth() + 1).padStart(2, '0') + '-' + String(hoy.getDate()).padStart(2, '0');
            
            // Generar ID y Recibo automáticamente
            document.getElementById('recibo').value = 'REC-' + fechaStr + '-' + Math.floor(Math.random() * 9000 + 1000);
            document.getElementById('id').value = 'BUG-' + Math.floor(Math.random() * 9000 + 1000);
            
            // Fecha por defecto: hoy + 7 días
            const semana = new Date();
            semana.setDate(semana.getDate() + 7);
            document.getElementById('fechaExcursion').value = semana.toISOString().split('T')[0];
            
            calcularSubtotal();
            calcularTotal();
            ajustarDeposito();
        });

        // ====== CALCULAR SUBTOTAL ======
        document.getElementById('adultos').addEventListener('input', function() {
            calcularSubtotal();
            calcularTotal();
            ajustarDeposito();
        });
        document.getElementById('ninos').addEventListener('input', function() {
            calcularSubtotal();
            calcularTotal();
            ajustarDeposito();
        });
        document.getElementById('precioAdulto').addEventListener('input', function() {
            calcularSubtotal();
            calcularTotal();
            ajustarDeposito();
        });
        document.getElementById('precioNino').addEventListener('input', function() {
            calcularSubtotal();
            calcularTotal();
            ajustarDeposito();
        });

        function calcularSubtotal() {
            const adultos = parseInt(document.getElementById('adultos').value) || 0;
            const ninos = parseInt(document.getElementById('ninos').value) || 0;
            const precioAdulto = parseFloat(document.getElementById('precioAdulto').value) || 0;
            const precioNino = parseFloat(document.getElementById('precioNino').value) || 0;
            
            const subtotal = (adultos * precioAdulto) + (ninos * precioNino);
            document.getElementById('subtotal').value = subtotal.toFixed(2);
        }

        // ====== CALCULAR TOTAL CON DESCUENTO ======
        function calcularTotal() {
            const subtotal = parseFloat(document.getElementById('subtotal').value) || 0;
            const descuento = parseFloat(document.getElementById('descuento').value) || 0;
            const total = subtotal - descuento;
            document.getElementById('total').value = total.toFixed(2);
            ajustarDeposito();
        }

        // ====== MOSTRAR/OCULTAR CAMPO DE DESCUENTO ======
        function toggleDescuento() {
            const group = document.getElementById('descuentoGroup');
            const btn = document.getElementById('btnDescuento');
            
            group.classList.toggle('visible');
            
            if (group.classList.contains('visible')) {
                btn.textContent = 'Quitar Descuento';
                btn.classList.add('activo');
            } else {
                document.getElementById('descuento').value = '';
                btn.textContent = 'Agregar Descuento';
                btn.classList.remove('activo');
                calcularTotal();
            }
        }

        // ====== AJUSTAR DEPÓSITO SEGÚN EL ESTADO ======
        function ajustarDeposito() {
            const estado = document.querySelector('input[name="estado"]:checked').value;
            const total = parseFloat(document.getElementById('total').value) || 0;
            const depositoInput = document.getElementById('deposito');
            
            if (estado === 'completo') {
                depositoInput.value = total.toFixed(2);
            } else if (estado === 'deposito') {
                depositoInput.value = (total * 0.25).toFixed(2);
            } else if (estado === 'pendiente') {
                depositoInput.value = '0.00';
            }
        }

        // ====== ENVIAR FORMULARIO ======
        document.getElementById('formRecibo').addEventListener('submit', function(e) {
            e.preventDefault();

            const id = document.getElementById('id').value;
            const recibo = document.getElementById('recibo').value;
            const cliente = document.getElementById('cliente').value;
            const excursion = document.getElementById('excursion').value;
            const adultos = document.getElementById('adultos').value;
            const ninos = document.getElementById('ninos').value;
            const precioAdulto = document.getElementById('precioAdulto').value;
            const precioNino = document.getElementById('precioNino').value;
            const subtotal = document.getElementById('subtotal').value;
            const descuento = document.getElementById('descuento').value || '0';
            const total = document.getElementById('total').value;
            const deposito = document.getElementById('deposito').value;
            const estado = document.querySelector('input[name="estado"]:checked').value;
            const metodoPago = document.getElementById('metodoPago').value;
            const whatsapp = document.getElementById('whatsapp').value || '';
            const correo = document.getElementById('correo').value || '';
            const hotel = document.getElementById('hotel').value || '';
            const habitacion = document.getElementById('habitacion').value || '';
            const transporte = document.getElementById('transporte').value || 'Sí';
            const notas = document.getElementById('notas').value || 'Sin notas adicionales';
            const fechaExcursion = document.getElementById('fechaExcursion').value || '';

            if (!id || !recibo || !cliente || !excursion || !adultos || !precioAdulto) {
                alert('Por favor, completa los campos obligatorios');
                return;
            }

            const base = 'https://recibo-app.vercel.app/ver-recibo';
            const params = new URLSearchParams({
                id: id,
                recibo: recibo,
                cliente: cliente,
                excursion: excursion,
                adultos: adultos,
                ninos: ninos,
                precioAdulto: precioAdulto,
                precioNino: precioNino,
                subtotal: subtotal,
                descuento: descuento,
                total: total,
                deposito: deposito,
                estado: estado,
                metodoPago: metodoPago,
                whatsapp: whatsapp,
                correo: correo,
                hotel: hotel,
                habitacion: habitacion,
                transporte: transporte,
                notas: notas,
                fechaExcursion: fechaExcursion
            });

            const enlace = base + '?' + params.toString();

            document.getElementById('enlaceGenerado').textContent = enlace;
            document.getElementById('verRecibo').href = enlace;

            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(enlace)}&size=200x200`;
            document.getElementById('qrImg').src = qrUrl;

            const mensaje = `Hola ${cliente}, tu recibo de ${excursion} está listo. Escanea este QR o haz clic en el enlace: ${enlace}`;
            document.getElementById('whatsappLink').href = `https://wa.me/1${whatsapp ? '?text=' + encodeURIComponent(mensaje) : '?text=' + encodeURIComponent(mensaje)}`;

            document.getElementById('resultado').classList.add('visible');
        });

        function copiarEnlace() {
            const enlace = document.getElementById('enlaceGenerado').textContent;
            navigator.clipboard.writeText(enlace).then(() => {
                alert('Enlace copiado al portapapeles');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = enlace;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('Enlace copiado al portapapeles');
            });
        }

        function descargarQR() {
            const qrImg = document.getElementById('qrImg');
            const link = document.createElement('a');
            link.download = 'recibo-qr-' + document.getElementById('id').value + '.png';
            link.href = qrImg.src;
            link.click();
        }
    </script>
</body>
</html>
