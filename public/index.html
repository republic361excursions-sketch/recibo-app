<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Republic Excursions - Generador de Recibos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container {
            background: #ffffff;
            max-width: 700px;
            width: 100%;
            padding: 45px 50px;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            border: 1px solid #edebe6;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #1a2a4a;
            letter-spacing: 2px;
        }

        .header h1 span {
            color: #c9a84c;
        }

        .subtitulo {
            font-size: 14px;
            color: #8e9aaf;
            margin-bottom: 30px;
            font-weight: 400;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        .form-group label .required {
            color: #e74c3c;
            font-weight: 700;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #eae8e3;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: border 0.3s;
            background: #fafaf8;
            color: #2c3e50;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #1a2a4a;
            outline: none;
            background: white;
        }

        .form-group input::placeholder {
            color: #b5c0d0;
            font-weight: 300;
            font-size: 13px;
        }

        .form-row {
            display: flex;
            gap: 20px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .small-hint {
            color: #b5c0d0;
            font-size: 12px;
            margin-top: 4px;
            font-weight: 300;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: #1a2a4a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            font-family: 'Inter', sans-serif;
            letter-spacing: 1px;
            margin-top: 8px;
        }

        .btn:hover {
            background: #2c3e6e;
        }

        .btn-descuento {
            background: #8e9aaf;
            padding: 12px 18px;
            font-size: 13px;
            width: auto;
            margin-top: 0;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .btn-descuento:hover {
            background: #6b7a8f;
        }

        .btn-descuento.activo {
            background: #e74c3c;
        }

        .btn-descuento.activo:hover {
            background: #c0392b;
        }

        .descuento-activo {
            display: none;
        }

        .descuento-activo.visible {
            display: block;
        }

        .estado-options {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            padding-top: 4px;
        }

        .estado-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 400;
            cursor: pointer;
            font-size: 14px;
            color: #2c3e50;
        }

        .estado-options input[type="radio"] {
            width: 16px;
            height: 16px;
            accent-color: #1a2a4a;
            cursor: pointer;
        }

        .resultado {
            margin-top: 30px;
            padding: 25px;
            background: #f8f7f4;
            border-radius: 10px;
            display: none;
            border: 2px solid #c9a84c;
        }

        .resultado.visible {
            display: block;
        }

        .resultado h3 {
            color: #1a2a4a;
            font-size: 18px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 600;
        }

        .resultado .enlace {
            word-break: break-all;
            background: white;
            padding: 14px;
            border-radius: 6px;
            border: 1px solid #eae8e3;
            font-size: 13px;
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .resultado .qr-container {
            text-align: center;
            margin: 15px 0;
        }

        .resultado .qr-container img {
            max-width: 160px;
            border: 2px solid #eae8e3;
            border-radius: 10px;
            padding: 8px;
            background: white;
        }

        .acciones {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .btn-copiar {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
        }

        .btn-copiar:hover {
            background: #218838;
        }

        .btn-qr {
            background: #c9a84c;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
        }

        .btn-qr:hover {
            background: #b8973a;
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
        }

        .btn-whatsapp:hover {
            background: #1da851;
        }

        .btn-ver-recibo {
            display: inline-block;
            background: #1a2a4a;
            color: white;
            padding: 10px 22px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            text-align: center;
        }

        .btn-ver-recibo:hover {
            background: #2c3e6e;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px 20px;
            }
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            .estado-options {
                flex-direction: column;
                gap: 8px;
            }
            .resultado .enlace {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Republic <span>Excursions</span></h1>
        </div>
        <p class="subtitulo">Generador de Recibos de Pago</p>

        <form id="formRecibo">
            <!-- ID -->
            <div class="form-group">
                <label>ID / Código de Reserva</label>
                <input type="text" id="id" placeholder="Ej: BUG-5198">
            </div>

            <!-- CLIENTE -->
            <div class="form-group">
                <label>Cliente <span class="required">*</span></label>
                <input type="text" id="cliente" placeholder="Nombre completo">
            </div>

            <!-- WHATSAPP + CORREO -->
            <div class="form-row">
                <div class="form-group">
                    <label>WhatsApp</label>
                    <input type="text" id="whatsapp" placeholder="Ej: 809-555-1234">
                </div>
                <div class="form-group">
                    <label>Correo</label>
                    <input type="email" id="correo" placeholder="correo@ejemplo.com">
                </div>
            </div>

           <!-- HOTEL + AIRBNB + HABITACION -->
<div class="form-row">
    <div class="form-group">
        <label>Hotel / Airbnb</label>
        <input type="text" id="hotel" placeholder="Nombre del hotel o Airbnb">
    </div>
    <div class="form-group">
        <label>Habitación</label>
        <input type="text" id="habitacion" placeholder="Ej: 123">
    </div>
</div>

            <!-- TRANSPORTE + FECHA -->
            <div class="form-row">
                <div class="form-group">
                    <label>Transporte</label>
                    <select id="transporte">
                        <option value="Sí">Sí</option>
                        <option value="No">No</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Fecha de la Excursión</label>
                    <input type="date" id="fechaExcursion">
                </div>
            </div>

            <!-- EXCURSION -->
            <div class="form-group">
                <label>Excursión <span class="required">*</span></label>
                <input type="text" id="excursion" placeholder="Nombre de la excursión">
            </div>

            <!-- ADULTOS + NIÑOS -->
            <div class="form-row">
                <div class="form-group">
                    <label>Adultos <span class="required">*</span></label>
                    <input type="number" id="adultos" placeholder="Cantidad" min="0">
                </div>
                <div class="form-group">
                    <label>Niños</label>
                    <input type="number" id="ninos" placeholder="Cantidad" min="0">
                </div>
            </div>

            <!-- PRECIOS -->
            <div class="form-row">
                <div class="form-group">
                    <label>Precio por Adulto (USD) <span class="required">*</span></label>
                    <input type="number" id="precioAdulto" placeholder="Ej: 45" min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label>Precio por Niño (USD)</label>
                    <input type="number" id="precioNino" placeholder="Ej: 25" min="0" step="0.01">
                    <div class="small-hint">Si no aplica, dejar en 0.</div>
                </div>
            </div>

            <!-- SUBTOTAL + DEPOSITO -->
            <div class="form-row">
                <div class="form-group">
                    <label>Subtotal (USD)</label>
                    <input type="number" id="subtotal" min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label>Depósito (USD)</label>
                    <input type="number" id="deposito" min="0" step="0.01">
                </div>
            </div>

            <!-- DESCUENTO -->
            <div class="form-group descuento-activo" id="descuentoGroup">
                <label>Descuento (USD)</label>
                <input type="number" id="descuento" min="0" step="0.01" oninput="calcularTotal()">
                <div class="small-hint">Monto a descontar del subtotal</div>
            </div>

            <!-- TOTAL + DESCUENTO -->
            <div class="form-row">
                <div class="form-group">
                    <label>Total (USD)</label>
                    <input type="number" id="total" min="0" step="0.01" readonly style="background:#f0f0f0; font-weight:600; color:#1a2a4a;">
                </div>
                <div class="form-group" style="display:flex; align-items:flex-end;">
                    <button type="button" class="btn btn-descuento" id="btnDescuento" onclick="toggleDescuento()">
                        + Agregar Descuento
                    </button>
                </div>
            </div>

            <!-- ESTADO DE PAGO -->
            <div class="form-group">
                <label>Estado de Pago</label>
                <div class="estado-options">
                    <label><input type="radio" name="estado" value="deposito" checked onclick="ajustarDeposito()"> Depósito (25%)</label>
                    <label><input type="radio" name="estado" value="completo" onclick="ajustarDeposito()"> Pago Completo</label>
                    <label><input type="radio" name="estado" value="pendiente" onclick="ajustarDeposito()"> Pendiente</label>
                </div>
                <div class="small-hint" style="margin-top:6px;">Al seleccionar "Pago Completo", el depósito se ajusta al total.</div>
            </div>

            <!-- METODO PAGO + NOTAS -->
            <div class="form-row">
                <div class="form-group">
                    <label>Método de Pago</label>
                    <select id="metodoPago">
                        <option value="Efectivo">Efectivo</option>
                        <option value="PayPal">PayPal</option>
                        <option value="Tarjeta de Crédito">Tarjeta de Crédito</option>
                        <option value="Transferencia Bancaria">Transferencia Bancaria</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Notas</label>
                    <input type="text" id="notas" placeholder="Notas adicionales">
                </div>
            </div>

            <button type="submit" class="btn">GENERAR RECIBO</button>
        </form>

        <!-- RESULTADO -->
        <div id="resultado" class="resultado">
            <h3>Recibo Generado</h3>
            
            <div class="qr-container">
                <img id="qrImg" src="" alt="QR Code">
            </div>

            <div class="enlace" id="enlaceGenerado"></div>

            <div class="acciones">
                <button class="btn-copiar" onclick="copiarEnlace()">Copiar Enlace</button>
                <button class="btn-qr" onclick="descargarQR()">Descargar QR</button>
                <a id="whatsappLink" href="#" target="_blank" class="btn-whatsapp">WhatsApp</a>
                <a id="verRecibo" href="#" target="_blank" class="btn-ver-recibo">Ver Recibo</a>
            </div>
        </div>
    </div>

    <script>
        // ====== GENERAR FECHA ======
        document.addEventListener('DOMContentLoaded', function() {
            const semana = new Date();
            semana.setDate(semana.getDate() + 7);
            document.getElementById('fechaExcursion').value = semana.toISOString().split('T')[0];
            
            calcularSubtotal();
            calcularTotal();
            ajustarDeposito();
        });

        // ====== CALCULAR SUBTOTAL ======
        document.getElementById('adultos').addEventListener('input', function() {
            calcularSubtotal(); calcularTotal(); ajustarDeposito();
        });
        document.getElementById('ninos').addEventListener('input', function() {
            calcularSubtotal(); calcularTotal(); ajustarDeposito();
        });
        document.getElementById('precioAdulto').addEventListener('input', function() {
            calcularSubtotal(); calcularTotal(); ajustarDeposito();
        });
        document.getElementById('precioNino').addEventListener('input', function() {
            calcularSubtotal(); calcularTotal(); ajustarDeposito();
        });

        function calcularSubtotal() {
            const adultos = parseInt(document.getElementById('adultos').value) || 0;
            const ninos = parseInt(document.getElementById('ninos').value) || 0;
            const precioAdulto = parseFloat(document.getElementById('precioAdulto').value) || 0;
            const precioNino = parseFloat(document.getElementById('precioNino').value) || 0;
            const subtotal = (adultos * precioAdulto) + (ninos * precioNino);
            document.getElementById('subtotal').value = subtotal.toFixed(2);
        }

        // ====== CALCULAR TOTAL ======
        function calcularTotal() {
            const subtotal = parseFloat(document.getElementById('subtotal').value) || 0;
            const descuento = parseFloat(document.getElementById('descuento').value) || 0;
            const total = subtotal - descuento;
            document.getElementById('total').value = total.toFixed(2);
            ajustarDeposito();
        }

        // ====== DESCUENTO ======
        function toggleDescuento() {
            const group = document.getElementById('descuentoGroup');
            const btn = document.getElementById('btnDescuento');
            group.classList.toggle('visible');
            if (group.classList.contains('visible')) {
                btn.innerHTML = 'Quitar Descuento';
                btn.classList.add('activo');
            } else {
                document.getElementById('descuento').value = '';
                btn.innerHTML = '+ Agregar Descuento';
                btn.classList.remove('activo');
                calcularTotal();
            }
        }

        // ====== AJUSTAR DEPOSITO ======
        function ajustarDeposito() {
            const estado = document.querySelector('input[name="estado"]:checked').value;
            const total = parseFloat(document.getElementById('total').value) || 0;
            const depositoInput = document.getElementById('deposito');
            if (estado === 'completo') {
                depositoInput.value = total.toFixed(2);
            } else if (estado === 'deposito') {
                depositoInput.value = (total * 0.25).toFixed(2);
            } else if (estado === 'pendiente') {
                depositoInput.value = '0.00';
            }
        }

        // ====== ENVIAR ======
        document.getElementById('formRecibo').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const id = document.getElementById('id').value;
            const cliente = document.getElementById('cliente').value;
            const excursion = document.getElementById('excursion').value;
            const adultos = document.getElementById('adultos').value;
            const ninos = document.getElementById('ninos').value;
            const precioAdulto = document.getElementById('precioAdulto').value;
            const precioNino = document.getElementById('precioNino').value;
            const subtotal = document.getElementById('subtotal').value;
            const descuento = document.getElementById('descuento').value || '0';
            const total = document.getElementById('total').value;
            const deposito = document.getElementById('deposito').value;
            const estado = document.querySelector('input[name="estado"]:checked').value;
            const metodoPago = document.getElementById('metodoPago').value;
            const whatsapp = document.getElementById('whatsapp').value || '';
            const correo = document.getElementById('correo').value || '';
            const hotel = document.getElementById('hotel').value || '';
            const habitacion = document.getElementById('habitacion').value || '';
            const transporte = document.getElementById('transporte').value || 'Sí';
            const notas = document.getElementById('notas').value || 'Sin notas adicionales';
            const fechaExcursion = document.getElementById('fechaExcursion').value || '';

            if (!id || !cliente || !excursion || !adultos || !precioAdulto) {
                alert('Por favor, completa los campos obligatorios');
                return;
            }

            const base = 'https://recibo-app.vercel.app/ver-recibo';
            const params = new URLSearchParams({
                id: id, recibo: id, cliente: cliente, excursion: excursion,
                adultos: adultos, ninos: ninos, precioAdulto: precioAdulto,
                precioNino: precioNino, subtotal: subtotal, descuento: descuento,
                total: total, deposito: deposito, estado: estado,
                metodoPago: metodoPago, whatsapp: whatsapp, correo: correo,
                hotel: hotel, habitacion: habitacion, transporte: transporte,
                notas: notas, fechaExcursion: fechaExcursion
            });

            // Enlace para clientes (SIN admin)
            const enlaceQR = base + '?' + params.toString();
            
            // Enlace para administrador (CON admin)
            const enlaceAdmin = base + '?' + params.toString() + '&admin=true';

            // Mostramos el enlace SIN admin para copiar
            document.getElementById('enlaceGenerado').textContent = enlaceQR;
            document.getElementById('verRecibo').href = enlaceAdmin;

            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(enlaceQR)}&size=200x200`;
            document.getElementById('qrImg').src = qrUrl;

            const mensaje = `Hola ${cliente}, tu recibo de ${excursion} está listo. Escanea este QR o haz clic en el enlace: ${enlaceQR}`;
            document.getElementById('whatsappLink').href = `https://wa.me/1${whatsapp ? '?text=' + encodeURIComponent(mensaje) : '?text=' + encodeURIComponent(mensaje)}`;

            document.getElementById('resultado').classList.add('visible');
        });

        function copiarEnlace() {
            const enlace = document.getElementById('enlaceGenerado').textContent;
            navigator.clipboard.writeText(enlace).then(() => {
                alert('Enlace copiado');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = enlace;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('Enlace copiado');
            });
        }

        function descargarQR() {
            const qrImg = document.getElementById('qrImg');
            const link = document.createElement('a');
            link.download = 'recibo-qr-' + document.getElementById('id').value + '.png';
            link.href = qrImg.src;
            link.click();
        }
    </script>
</body>
</html>
